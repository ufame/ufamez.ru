<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ufame</title>
  <meta name="description" content="Kirill ufame">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="webmanifest">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'fade-in': 'fadeIn 0.7s ease-out forwards',
            'slide-up': 'slideUp 0.7s ease-out forwards',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="bg-[#0d0d0d] text-white min-h-screen font-sans antialiased">

<div class="max-w-7xl mx-auto px-6 py-12 lg:py-20">

  <!-- ===== LAYOUT: mobile=stack, desktop=side-by-side ===== -->
  <div class="lg:flex lg:gap-16">

    <!-- ==================== PROFILE ==================== -->
    <aside class="flex flex-col items-center lg:items-start text-center lg:text-left lg:sticky lg:top-20 lg:self-start lg:w-72 shrink-0">

      <img
        src="https://avatars.githubusercontent.com/u/90481351?v=4"
        alt="ufame"
        width="128" height="128"
        class="w-24 h-24 lg:w-20 lg:h-20 rounded-full ring-2 ring-white/10 shadow-2xl opacity-0 animate-fade-in"
        style="animation-delay: 0.1s"
      >

      <div class="mt-6 space-y-2 opacity-0 animate-slide-up" style="animation-delay: 0.2s">
        <h1 class="text-5xl lg:text-5xl font-black tracking-tight">
          <span class="bg-gradient-to-r from-orange-400 to-rose-400 bg-clip-text text-transparent">ufa</span><span class="text-white/90">me</span>
        </h1>
        <p class="text-base text-white/40 font-light">Kirill, Ufa</p>
        <p class="text-base text-white/40 font-light">Republic of Bashkortostan</p>
      </div>

      <nav class="mt-6 flex flex-wrap justify-center lg:justify-start gap-3 opacity-0 animate-slide-up" style="animation-delay: 0.35s">
        <a
          href="https://github.com/ufame"
          target="_blank" rel="noopener noreferrer"
          class="flex items-center gap-2 px-4 py-2 rounded-xl border border-white/10 bg-white/[0.03] text-white/60 hover:text-white hover:border-white/25 hover:bg-white/[0.07] transition-all duration-300 hover:-translate-y-0.5"
          title="GitHub"
        >
          <i class="fa-brands fa-github text-lg"></i>
          <span class="text-sm font-medium">GitHub</span>
        </a>
        <a
          href="https://t.me/ufamez"
          target="_blank" rel="noopener noreferrer"
          class="flex items-center gap-2 px-4 py-2 rounded-xl border border-white/10 bg-white/[0.03] text-white/60 hover:text-[#26A5E4] hover:border-[#26A5E4]/30 hover:bg-[#26A5E4]/[0.07] transition-all duration-300 hover:-translate-y-0.5"
          title="Telegram"
        >
          <i class="fa-brands fa-telegram text-lg"></i>
          <span class="text-sm font-medium">Telegram</span>
        </a>

      </nav>

      <div class="mt-8 flex flex-wrap justify-center lg:justify-start gap-2 opacity-0 animate-slide-up" style="animation-delay: 0.5s">
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-white/[0.04] border border-white/[0.06] text-xs text-white/40"><i class="fa-brands fa-node-js text-sm"></i> Node.js</span>
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-white/[0.04] border border-white/[0.06] text-xs text-white/40">C#</span>
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-white/[0.04] border border-white/[0.06] text-xs text-white/40"><i class="fa-brands fa-git-alt text-sm"></i> Git</span>
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-white/[0.04] border border-white/[0.06] text-xs text-white/40">Pawn</span>
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-white/[0.04] border border-white/[0.06] text-xs text-white/40"><i class="fa-brands fa-docker text-sm"></i> Docker</span>
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-white/[0.04] border border-white/[0.06] text-xs text-white/40"><i class="fa-solid fa-terminal text-[11px]"></i> Bash</span>
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-white/[0.04] border border-white/[0.06] text-xs text-white/40"><i class="fa-solid fa-database text-[11px]"></i> MySQL</span>
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-white/[0.04] border border-white/[0.06] text-xs text-white/40">Postman</span>
      </div>

      <p class="hidden lg:block mt-10 text-xs text-white/15 opacity-0 animate-fade-in" style="animation-delay: 0.6s">
        &copy; 2026 ufame
      </p>
    </aside>

    <!-- ==================== PROJECTS ==================== -->
    <section class="mt-16 lg:mt-0 flex-1 min-w-0">
      <div id="projects-grid" class="grid gap-4 sm:grid-cols-2 xl:grid-cols-3"></div>

      <p class="mt-10 text-xs text-white/15 text-center lg:hidden opacity-0 animate-fade-in" style="animation-delay: 0.9s">
        &copy; 2026 ufame
      </p>
    </section>

  </div>
</div>

<!-- ==================== PROJECTS DATA + RENDER ==================== -->
<script>
const projects = [
  {
    name: "UBanSystem",
    owner: "ufame",
    desc: "Modern ban system for Counter-Strike 1.6 administrators written in Amxx Pawn.",
    lang: "Pawn", langColor: "#dbb284",
    stars: 5,
    url: "https://github.com/ufame/UBanSystem"
  },
  {
    name: "gamedig-api",
    owner: "Virtual-Instanity",
    desc: "A very simple API for querying game server information using GameDig and Bun.",
    lang: "TypeScript", langColor: "#3178c6",
    stars: 1,
    url: "https://github.com/Virtual-Instanity/gamedig-api"
  },
  {
    name: "PlayerPreferences-API",
    owner: "AmxxModularEcosystem",
    desc: "Easily manage and store player preferences — hats, music and other settings.",
    lang: "Pawn", langColor: "#dbb284",
    stars: 1,
    url: "https://github.com/AmxxModularEcosystem/PlayerPreferences-API"
  }
];

const grid = document.getElementById('projects-grid');

projects.forEach((p, i) => {
  const card = document.createElement('a');
  card.href = p.url;
  card.target = '_blank';
  card.rel = 'noopener noreferrer';
  card.className = 'group block rounded-2xl border border-white/[0.06] bg-white/[0.02] overflow-hidden hover:border-white/[0.14] hover:bg-white/[0.04] transition-all duration-400 hover:-translate-y-1 hover:shadow-xl hover:shadow-black/30 opacity-0 animate-slide-up';
  card.style.animationDelay = (0.45 + i * 0.08) + 's';

  card.innerHTML = `
    <div class="aspect-[1200/630] overflow-hidden bg-[#0a0a0a]">
      <img
        src="https://opengraph.githubassets.com/1/${p.owner}/${p.name}"
        alt="${p.name}"
        loading="lazy"
        class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
      >
    </div>
    <div class="p-4">
      <div class="flex items-start justify-between gap-2">
        <div class="min-w-0">
          <span class="text-[10px] text-white/20">${p.owner !== 'ufame' ? p.owner + '/' : ''}</span>
          <h3 class="text-sm font-semibold text-white/85 truncate">${p.name}</h3>
        </div>
        <i class="fa-solid fa-arrow-up-right-from-square text-[10px] text-white/20 mt-1 shrink-0 group-hover:text-white/50 transition-colors"></i>
      </div>
      <p class="mt-1.5 text-xs text-white/35 leading-relaxed line-clamp-2">${p.desc}</p>
      <div class="mt-3 flex items-center gap-3 text-[11px] text-white/25">
        <span class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full" style="background:${p.langColor}"></span>
          ${p.lang}
        </span>
        ${p.stars > 0 ? `
        <span class="flex items-center gap-1">
          <i class="fa-regular fa-star text-[10px]"></i>
          ${p.stars}
        </span>
        ` : ''}
      </div>
    </div>
  `;

  grid.appendChild(card);
});
</script>

</body>
</html>
